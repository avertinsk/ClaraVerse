# ============================================================
# ClaraVerse Production Stack — адаптировано под инфраструктуру:
#   LAN: 10.10.0.1/20
#   GPU: NVIDIA RTX 2070 Super (8GB VRAM)
#   Ollama: работает на хосте, порт 11434
# ============================================================

services:
  # ============================
  # Базы данных (bridge-сеть, существующие контейнеры)
  # ============================
  mongodb:
    image: mongo:7
    container_name: claraverse-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=claraverse
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - claraverse-network

  redis:
    image: redis:7-alpine
    container_name: claraverse-redis
    command: redis-server --appendonly yes --maxmemory 100mb --maxmemory-policy allkeys-lru --port 6380
    ports:
      - "6380:6380"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6380", "ping"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 5
    networks:
      - claraverse-network

  mysql:
    image: mysql:8.0
    container_name: claraverse-mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data-new:/var/lib/mysql
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    environment:
      - MYSQL_ROOT_PASSWORD=Testeriks~235
      - MYSQL_DATABASE=claraverse
      - MYSQL_USER=claraverse_user
      - MYSQL_PASSWORD=Testeriks~235
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-claraverse_root_2024}"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - claraverse-network

  searxng:
    image: searxng/searxng:latest
    container_name: claraverse-searxng
    ports:
      - "8080:8080"
    volumes:
      - searxng-config:/etc/searxng
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ ! -f /etc/searxng/settings.yml ]; then
          cat > /etc/searxng/settings.yml <<'SETTINGS'
        use_default_settings: true
        server:
          limiter: false
          secret_key: "claraverse-searxng-$(head -c 16 /dev/urandom | od -A n -t x1 | tr -d ' \n')"
          image_proxy: true
        search:
          formats:
            - html
            - json
          autocomplete: "duckduckgo"
        SETTINGS
        fi
        exec /usr/local/searxng/entrypoint.sh
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 3s
      start_period: 15s
      retries: 3
    networks:
      - claraverse-network

  # ============================
  # ClaraVerse (сборка из исходников + host.docker.internal)
  # ============================
  claraverse:
    build:
      context: .
      dockerfile: Dockerfile
    image: claraverse:${CLARAVERSE_TAG:-latest}
    container_name: claraverse
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - claraverse-data:/app/data
      - claraverse-uploads:/app/uploads
      - /srv/smb:/data/smb:ro
    environment:
      - ENVIRONMENT=production
      - SERVE_FRONTEND=true
      - PORT=3000
      - DATABASE_URL=mysql://claraverse_user:Testeriks~235@mysql:3306/claraverse?parseTime=true
      - MONGODB_URI=mongodb://mongodb:27017/claraverse
      - REDIS_URL=redis://redis:6380
      - SEARXNG_URL=http://searxng:8080
      - SEARXNG_URLS=http://searxng:8080
      - FRONTEND_URL=http://10.10.0.1:3000
      - BACKEND_URL=http://10.10.0.1:3000
      - ALLOWED_ORIGINS=*
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_MASTER_KEY=${ENCRYPTION_MASTER_KEY}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - COMPOSIO_API_KEY=${COMPOSIO_API_KEY}
      - E2B_API_KEY=${E2B_API_KEY}
      - UPLOAD_DIR=/app/uploads
      - PROVIDERS_FILE=/app/data/providers.json
      - DOCKER=true
    depends_on:
      mongodb:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      searxng:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - claraverse-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  claraverse-data:
    driver: local
  claraverse-uploads:
    driver: local
  mongodb-data:
    driver: local
  mysql-data-new:
    driver: local
  redis-data:
    driver: local
  searxng-config:
    driver: local

networks:
  claraverse-network:
    driver: bridge
